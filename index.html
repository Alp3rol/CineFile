<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/CineFile/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CineFile">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CineFile</title>
  <link rel="manifest" href="manifest.json">

  <!-- Firebase JS SDK (Compat version is required by flutterfire) -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <style>
    /* Clean full-screen style for local development */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #0B0D13;
    }

    /* Custom Scrollbar Styles for WebKit Browsers (Chrome, Safari, Edge) */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    /* Yatay kaydırma çubuklarını tarayıcı düzeyinde gizle */
    ::-webkit-scrollbar:horizontal {
      display: none !important;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12) !important;
      border-radius: 10px;
      border: 1px solid transparent;
      background-clip: padding-box;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(232, 54, 46, 0.5) !important; /* Cinematic Red hover */
    }
    
    /* Custom Scrollbar for Firefox */
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.12) transparent;
    }
  </style>
</head>
<body>
  <script>
    // MutationObserver to inject CSS to hide all scrollbars inside Shadow DOM
    const observer = new MutationObserver((mutations) => {
      const glassPane = document.querySelector('flt-glass-pane');
      if (glassPane && glassPane.shadowRoot) {
        if (!glassPane.shadowRoot.querySelector('#hide-horizontal-scrollbars')) {
          const style = document.createElement('style');
          style.id = 'hide-horizontal-scrollbars';
          style.textContent = `
            ::-webkit-scrollbar {
              display: none !important;
              width: 0px !important;
              height: 0px !important;
            }
            *::-webkit-scrollbar {
              display: none !important;
              width: 0px !important;
              height: 0px !important;
            }
            * {
              scrollbar-width: none !important;
              -ms-overflow-style: none !important;
            }
          `;
          glassPane.shadowRoot.appendChild(style);
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
